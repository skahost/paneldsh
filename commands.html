<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"*****Your Name******"- Commands</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="main-container">
        <section class="active-section">
            <div class="glass-panel">
                <h2>Command Library</h2>
                <div class="category-filters">
                    <button class="filter-btn active" onclick="filterCategory('ALL', this)">ALL</button>
                    <button class="filter-btn" onclick="filterCategory('LINUX', this)">Linux</button>
                    <button class="filter-btn" onclick="filterCategory('VPS', this)">VPS</button>
                    <button class="filter-btn" onclick="filterCategory('DOCKER', this)">Docker</button>
                    <button class="filter-btn" onclick="filterCategory('GIT', this)">Git</button>
                    <button class="filter-btn" onclick="filterCategory('NETWORKING', this)">Networking</button>
                    <button class="filter-btn" onclick="filterCategory('SYSTEM', this)">System</button>
                    <button class="filter-btn" onclick="filterCategory('AUTO', this)">Auto</button>
                    <button class="filter-btn" onclick="filterCategory('REVIEW', this)">Review</button>
                    <button class="filter-btn" onclick="filterCategory('SUGGESTION', this)">Suggestion</button>
                    <button class="filter-btn" onclick="filterCategory('USEFUL', this)">Useful</button>
                </div>
                <input type="text" id="cmdSearch" placeholder="Search commands..." onkeyup="searchCommands()" class="search-bar mt-10">
                <div class="table-container mt-20">
                    <table class="cmd-table" id="cmdTable">
                        </table>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
